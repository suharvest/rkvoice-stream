# RK1828 Qwen3-TTS profile (RKNN3 PCIe coprocessor).
#
# RK1828 is a PCIe endpoint accelerator attached to a host SoC (e.g. RK3588 /
# Radxa ROCK 5T). The Qwen3-TTS pipeline runs in an on-device C++ demo binary
# (server mode); the package drives it via a subprocess worker. The binary is
# built on the device (models/rk1828/) and is NOT shipped in the pip package —
# `binary_path` locates it at runtime.
name: "RK1828 Qwen3-TTS (PCIe coprocessor)"
platform: rk1828

tts:
  backend: qwen3_tts_rk1828
  binary_path: /opt/rk1828/rknn_qwen3_tts_demo
  model_dir: /opt/rk1828/models/qwen3_tts
  device_id: "0001:11:00.0"
  ref_speaker: girl_base
