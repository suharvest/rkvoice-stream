# RK3576 zh/en Full Stack: Paraformer RKNN ASR + Matcha TTS
name: "RK3576 Paraformer + Matcha"
platform: rk3576

asr:
  backend: paraformer_rknn
  model_dir: /opt/asr/paraformer
  rknn_dir: /opt/asr/paraformer/rknn/rk3576
  # Paraformer uses the hybrid split:
  #   encoder_prefix_to_block30.*.fp16.rknn on NPU,
  #   encoder_suffix_from_block30.onnx + decoder-rknn.onnx on CPU.
  # RK3576 boundary verifier passed; backend sample measured about 0.21 RTF.
  encoder_precision: fp16
  encoder_mode: hybrid
  decoder_backend: cpu
  encoder_suffix_onnx: /opt/asr/paraformer/encoder_suffix_from_block30.onnx
  decoder_onnx: /opt/asr/paraformer/decoder-rknn.onnx
  encoder_core: NPU_CORE_1

tts:
  backend: matcha_rknn
  model_dir: /opt/tts/models
  # Matcha/Vocos normally use NPU_CORE_0 so Paraformer can stay on CORE_1.
